spring.application.name=knodeledge-spring
server.port=8080

# PostgreSQL + pgvector
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/knodeledge}
spring.datasource.username=${DATABASE_USERNAME:knodeledge}
spring.datasource.password=${DATABASE_PASSWORD:knodeledge}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true

# Spring AI - OpenAI-compatible
spring.ai.model.chat=openai
spring.ai.model.embedding=openai
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.chat.options.max-tokens=1024
spring.ai.openai.embedding.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
spring.ai.openai.embedding.dimensions=${OPENAI_EMBEDDING_DIMENSIONS:1536}

# RAG retrieval
knodeledge.rag.embedding-dimensions=${OPENAI_EMBEDDING_DIMENSIONS:1536}
knodeledge.rag.dense-limit=${RAG_DENSE_LIMIT:30}
knodeledge.rag.sparse-limit=${RAG_SPARSE_LIMIT:30}
knodeledge.rag.rerank-limit=${RAG_RERANK_LIMIT:50}
knodeledge.rag.answer-context-limit=${RAG_ANSWER_CONTEXT_LIMIT:10}
knodeledge.rag.min-rerank-score=${RAG_MIN_RERANK_SCORE:0.15}

# Exact prompt-response cache
knodeledge.ai.prompt-cache.enabled=${PROMPT_CACHE_ENABLED:true}
knodeledge.ai.prompt-cache.max-entries=${PROMPT_CACHE_MAX_ENTRIES:1000}
