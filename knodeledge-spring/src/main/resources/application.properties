spring.application.name=knodeledge-spring
server.port=8085

# Topo-Tracer SDK configuration
topotracer.endpoint=http://localhost:3000
topotracer.apiKey=tt_tomwcTdATn6lc4zklZgRjm4QZ2NLdMiNtN5h7ifT1_8
topotracer.serviceName=knodeledge-spring
topotracer.batchSize=1
topotracer.flushIntervalMs=100

# Custom Trace Name and Importance Level Labels
topotracer.default-trace-name=KnodeledgeIngestTrace
topotracer.importanceLabels[0]=Critical Path
topotracer.importanceLabels[1]=IO & Telemetry
topotracer.importanceLabels[2]=Core Logic
