spring.application.name=knodeledge-spring
server.port=8085

# Topo-Tracer SDK configuration
topotracer.endpoint=http://localhost:3000
topotracer.apiKey=tt_tomwcTdATn6lc4zklZgRjm4QZ2NLdMiNtN5h7ifT1_8
topotracer.serviceName=knodeledge-spring
topotracer.batchSize=1
topotracer.flushIntervalMs=100

# Custom Trace Name and Importance Level Labels
topotracer.default-trace-name=KnodeledgeIngestTrace
topotracer.importanceLabels[0]=Controller & Service
topotracer.importanceLabels[1]=Database & Remote
topotracer.importanceLabels[2]=I/O
topotracer.importanceLabels[3]=Method

# Custom nodeType to importance level mappings configuration
topotracer.node-type-importance-mapping[controller]=0
topotracer.node-type-importance-mapping[service]=0
topotracer.node-type-importance-mapping[db-call]=1
topotracer.node-type-importance-mapping[remote-call]=1
topotracer.node-type-importance-mapping[io]=2
topotracer.node-type-importance-mapping[method]=3

# Spring AI Configuration (OpenAI-compatible APIs like OpenRouter, NVIDIA, Gemini, etc.)
spring.ai.openai.api-key=${OPENAI_API_KEY:mock-key}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.0